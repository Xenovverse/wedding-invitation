      /* ════════════════════════════════════════════

    let audioEl = null;

function startGamelan() {

    audioEl = new Audio("musik.mp3"); // ← sesuaikan nama file
    audioEl.loop = true;
    audioEl.volume = 0.7;

      /* ════════════════════════════════════════════
         FIX 1: PDF EXPORT — only the ticket section
      ════════════════════════════════════════════ */
      async function exportTicketAsPDF() {
        const ticketEl = document.getElementById("ticket-print-area");
        if (!ticketEl) return;

        try {
          const canvas = await html2canvas(ticketEl, {
            scale: 2,
            backgroundColor: "#ffffff",
            useCORS: true,
            logging: false,
          });

          const imgData = canvas.toDataURL("image/png");
          const { jsPDF } = window.jspdf;
          const pdf = new jsPDF({
            orientation: "portrait",
            unit: "mm",
            format: "a5",
          });

          const pdfWidth = pdf.internal.pageSize.getWidth();
          const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
          const yOffset = (pdf.internal.pageSize.getHeight() - pdfHeight) / 2;

          pdf.addImage(imgData, "PNG", 0, Math.max(0, yOffset), pdfWidth, pdfHeight);
          pdf.save(`Tiket-${C.bride.first}-${C.groom.first}.pdf`);
        } catch (err) {
          console.error("PDF export error:", err);
          alert("Gagal mengekspor PDF. Silakan coba lagi.");
        }
      }

      /* ════════════════════════════════════════════
         FIX 2: EXCEL EXPORT using SheetJS
         — Exports ALL RSVP data (not filtered view)
         — Sheet 1: Ringkasan (summary stats)
         — Sheet 2: Semua Tamu (full guest list)
         — Sheet 3: Tamu Hadir only
         — Sheet 4: Tamu Tidak Hadir only
         — Proper column widths + text wrap on pesan
      ════════════════════════════════════════════ */
      function exportExcel(allData) {
        const wb = XLSX.utils.book_new();

        const hadir   = allData.filter(r => r.attending === "yes");
        const absen   = allData.filter(r => r.attending === "no");
        const totalOrang = hadir.reduce((s, r) => s + Number(r.count || 1), 0);

        /* ── helper: buat worksheet dari array data ── */
        const makeSheet = (rows) => {
          const headers = ["No", "Nama Tamu", "Status Kehadiran", "Jumlah Tamu", "ID Tiket", "Ucapan / Pesan", "Waktu Konfirmasi"];
          const body = rows.map((r, i) => [
            i + 1,
            r.name || "",
            r.attending === "yes" ? "Hadir" : "Tidak Hadir",
            r.attending === "yes" ? Number(r.count || 1) : "-",
            r.ticketId || "-",
            r.message || "",
            r.at || "",
          ]);

          const ws = XLSX.utils.aoa_to_sheet([headers, ...body]);

          // Column widths
          ws["!cols"] = [
            { wch: 5 },   // No
            { wch: 30 },  // Nama
            { wch: 16 },  // Status
            { wch: 14 },  // Jumlah
            { wch: 12 },  // ID Tiket
            { wch: 45 },  // Pesan — lebar untuk teks panjang
            { wch: 24 },  // Waktu
          ];

          // Row heights & text wrap for pesan column (col index 5)
          const range = XLSX.utils.decode_range(ws["!ref"]);
          ws["!rows"] = [];
          for (let R = range.s.r; R <= range.e.r; R++) {
            ws["!rows"][R] = { hpt: R === 0 ? 20 : 40 }; // header 20pt, rows 40pt
            for (let C2 = range.s.c; C2 <= range.e.c; C2++) {
              const addr = XLSX.utils.encode_cell({ r: R, c: C2 });
              if (!ws[addr]) continue;
              const isHeader = R === 0;
              const isPesan  = C2 === 5;
              ws[addr].s = {
                font: { bold: isHeader, sz: isHeader ? 11 : 10 },
                alignment: {
                  vertical: "center",
                  wrapText: isPesan,
                  horizontal: C2 === 0 ? "center" : "left",
                },
                fill: isHeader
                  ? { fgColor: { rgb: "E2725B" }, patternType: "solid" }
                  : R % 2 === 0
                    ? { fgColor: { rgb: "FFF7F5" }, patternType: "solid" }
                    : { fgColor: { rgb: "FFFFFF" }, patternType: "solid" },
              };
              // White text on header
              if (isHeader) ws[addr].s.font.color = { rgb: "FFFFFF" };
            }
          }
          return ws;
        };

        /* ── Sheet 1: Ringkasan ── */
        const now = new Date().toLocaleString("id-ID");
        const summaryRows = [
          ["RINGKASAN RSVP", `${C.bride.first} & ${C.groom.first}`],
          [],
          ["Tanggal Pernikahan", C.dateDisplay],
          ["Diekspor pada", now],
          [],
          ["STATISTIK", "Jumlah"],
          ["Total Responden", allData.length],
          ["Tamu Hadir", hadir.length],
          ["Tamu Tidak Hadir", absen.length],
          ["Total Orang yang Hadir", totalOrang],
        ];
        const wsSummary = XLSX.utils.aoa_to_sheet(summaryRows);
        wsSummary["!cols"] = [{ wch: 28 }, { wch: 36 }];
        wsSummary["!rows"] = [{ hpt: 26 },{},{},{},{},{ hpt: 18 },{ hpt: 18 }];
        // Header style
        ["A1","B1"].forEach(a => {
          if (wsSummary[a]) wsSummary[a].s = { font:{ bold:true, sz:13, color:{rgb:"FFFFFF"} }, fill:{ fgColor:{rgb:"E2725B"}, patternType:"solid" }, alignment:{ vertical:"center" } };
        });
        // Sub-header STATISTIK
        ["A6","B6"].forEach(a => {
          if (wsSummary[a]) wsSummary[a].s = { font:{ bold:true, sz:10, color:{rgb:"6B7280"} }, fill:{ fgColor:{rgb:"F3F4F6"}, patternType:"solid" }, alignment:{ vertical:"center" } };
        });
        // Data rows
        ["A7","A8","A9","A10","B7","B8","B9","B10"].forEach(a => {
          if (wsSummary[a]) wsSummary[a].s = { font:{ sz:11 }, alignment:{ vertical:"center" } };
        });
        XLSX.utils.book_append_sheet(wb, wsSummary, "Ringkasan");

        /* ── Sheet 2: Semua Tamu (SEMUA DATA tanpa filter) ── */
        XLSX.utils.book_append_sheet(wb, makeSheet(allData), "Semua Tamu");

        /* ── Sheet 3: Hadir saja ── */
        if (hadir.length > 0)
          XLSX.utils.book_append_sheet(wb, makeSheet(hadir), "Tamu Hadir");

        /* ── Sheet 4: Tidak Hadir saja ── */
        if (absen.length > 0)
          XLSX.utils.book_append_sheet(wb, makeSheet(absen), "Tamu Tidak Hadir");

        XLSX.writeFile(wb, `RSVP-${C.bride.first}-${C.groom.first}.xlsx`);
      }

      /* ════════════════════════════════════════════

      const useCd = (iso) => {
        const [cd, setCd] = useState({ d:0, h:0, m:0, s:0 });
        useEffect(() => {
          const calc = () => {
            const diff = Math.max(0, new Date(iso) - new Date());
            setCd({ d:Math.floor(diff/86400000), h:Math.floor(diff/3600000)%24, m:Math.floor(diff/60000)%60, s:Math.floor(diff/1000)%60 });
          };
          calc();
          const id = setInterval(calc, 1000);
          return () => clearInterval(id);
        }, [iso]);
        return cd;
      };

      const CdBox = ({ value, label }) => {
        const [flash, setFlash] = useState(false);
        const prev = useRef(value);
        useEffect(() => {
          if (prev.current !== value) {
            setFlash(true);
            prev.current = value;
            const t = setTimeout(() => setFlash(false), 350);
            return () => clearTimeout(t);
          }
        }, [value]);
        return (
          <div style={{ textAlign:"center" }}>
            <div style={{ background:"#F9FAFB", border:"1px solid #F3F4F6", borderRadius:18, padding:"14px 6px", marginBottom:7 }}>
              <span className={flash?"cd-flash":""} style={{ fontFamily:"var(--font-serif)", fontSize:"clamp(22px,4vw,34px)", fontWeight:500, color:"var(--color-text)", display:"block", lineHeight:1 }}>{String(value).padStart(2,"0")}</span>
            </div>
            <p style={{ fontFamily:"var(--font-sans)", fontSize:9, letterSpacing:".25em", textTransform:"uppercase", color:"#9CA3AF", margin:0 }}>{label}</p>
          </div>
        );
      };

                </button>
              )}
              <button onClick={onReset} style={{ flex:1, padding:"13px", borderRadius:14, border:"1.5px solid #E5E7EB", background:"transparent", fontFamily:"var(--font-sans)", fontSize:13, fontWeight:500, color:"#6B7280", cursor:"pointer" }}>
                Kirim Pesan Lain
              </button>
            </div>
          </div>
        );
      };

      /* ════════════════════════════════════════════
         ④ RSVP FORM
      ════════════════════════════════════════════ */
      const RSVP = () => {
        const [f, setF] = useState({ name:"", attending:"yes", count:1, message:"" });
        const [done, setDone] = useState(false);
        const [result, setResult] = useState(null);
        const up = (k, v) => setF(x => ({ ...x, [k]: v }));

        const submit = (e) => {
          e.preventDefault();
          const data = { ...f, ticketId: genId(), at: new Date().toLocaleString("id-ID") };
          saveRSVP(data);
          setResult(data);
          setDone(true);
        };

        return (
          <section id="rsvp" style={{ padding:"96px 24px", background:"var(--color-bg)", position:"relative" }}>
            <div style={{ position:"absolute", top:0, left:0, right:0, height:1, background:"linear-gradient(to right,transparent,rgba(226,114,91,.2),transparent)" }} />
            <div style={{ maxWidth:560, margin:"0 auto" }}>
              <div className="sr" style={{ textAlign:"center", marginBottom:52 }}>
                <p style={{ fontFamily:"var(--font-sans)", fontSize:10, letterSpacing:".38em", textTransform:"uppercase", color:"var(--color-accent)", marginBottom:10 }}>Konfirmasi Kehadiran</p>
                <h2 className="font-serif" style={{ fontSize:"clamp(36px,6vw,52px)", fontWeight:500, color:"var(--color-text)", margin:"0 0 16px" }}>RSVP</h2>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:12 }}>
                  <div style={{ height:1, width:36, background:"#E5E7EB" }} />
                  <div style={{ width:7, height:7, borderRadius:"50%", background:"var(--color-accent)" }} />
                  <div style={{ height:1, width:36, background:"#E5E7EB" }} />
                </div>
                <p style={{ fontFamily:"var(--font-sans)", fontSize:13.5, color:"#6B7280", marginTop:18, lineHeight:1.7 }}>
                  Konfirmasi sebelum <strong style={{ color:"var(--color-text)" }}>{C.rsvpDeadline}</strong>
                </p>
              </div>
              <div className="sr d1" style={{ background:"#fff", borderRadius:28, border:"1.5px solid rgba(0,0,0,.05)", padding:"36px 32px", boxShadow:"0 4px 32px rgba(0,0,0,.04)" }}>
                {!done ? (
                  <form onSubmit={submit}>
                    <div style={{ marginBottom:22 }}>
                      <label style={{ display:"block", fontFamily:"var(--font-sans)", fontSize:10, letterSpacing:".22em", textTransform:"uppercase", color:"#9CA3AF", marginBottom:8 }}>Nama Lengkap</label>
                      <input type="text" required className="form-field" placeholder="Tulis nama Anda" value={f.name} onChange={e => up("name", e.target.value)} />
                    </div>
                    <div style={{ marginBottom:22 }}>
                      <label style={{ display:"block", fontFamily:"var(--font-sans)", fontSize:10, letterSpacing:".22em", textTransform:"uppercase", color:"#9CA3AF", marginBottom:10 }}>Kehadiran</label>
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                        {[{v:"yes",l:"✓  Hadir"},{v:"no",l:"✕  Tidak Hadir"}].map(({ v,l }) => (
                          <button key={v} type="button" onClick={() => up("attending",v)} style={{ fontFamily:"var(--font-sans)", fontSize:13, fontWeight:500, padding:"13px", borderRadius:14, cursor:"pointer", border:`1.5px solid ${f.attending===v?"var(--color-accent)":"#E5E7EB"}`, background:f.attending===v?"var(--color-accent-soft)":"#FAFAFA", color:f.attending===v?"var(--color-accent)":"#6B7280", transition:"all .2s" }}>{l}</button>
                        ))}
                      </div>
                    </div>
                    {f.attending === "yes" && (
                      <div style={{ marginBottom:22 }}>
                        <label style={{ display:"block", fontFamily:"var(--font-sans)", fontSize:10, letterSpacing:".22em", textTransform:"uppercase", color:"#9CA3AF", marginBottom:10 }}>Jumlah Tamu</label>
                        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                          {[1,2,3,4,5].map(n => (
                            <button key={n} type="button" onClick={() => up("count",n)} style={{ width:42, height:42, borderRadius:12, cursor:"pointer", fontFamily:"var(--font-sans)", fontSize:14, fontWeight:500, border:`1.5px solid ${f.count===n?"var(--color-accent)":"#E5E7EB"}`, background:f.count===n?"var(--color-accent)":"#FAFAFA", color:f.count===n?"#fff":"#6B7280", transition:"all .2s" }}>{n}</button>
                          ))}
                          <span style={{ fontFamily:"var(--font-sans)", fontSize:13, color:"#9CA3AF", marginLeft:6 }}>orang</span>
                        </div>
                      </div>
                    )}
                    <div style={{ marginBottom:28 }}>
                      <label style={{ display:"block", fontFamily:"var(--font-sans)", fontSize:10, letterSpacing:".22em", textTransform:"uppercase", color:"#9CA3AF", marginBottom:8 }}>Ucapan & Doa</label>
                      <textarea className="form-field" rows={4} style={{ resize:"none" }} placeholder="Tulis ucapan dan doa…" value={f.message} onChange={e => up("message", e.target.value)} />
                    </div>
                    <button type="submit" style={{ width:"100%", padding:"16px", borderRadius:16, border:"none", cursor:"pointer", fontFamily:"var(--font-sans)", fontSize:14, fontWeight:600, letterSpacing:".06em", background:"var(--color-accent)", color:"#fff", boxShadow:"0 6px 20px rgba(226,114,91,.3)", transition:"all .2s" }}
                      onMouseEnter={e=>{ e.currentTarget.style.background="var(--color-accent-dark)"; e.currentTarget.style.transform="translateY(-2px)"; }}
                      onMouseLeave={e=>{ e.currentTarget.style.background="var(--color-accent)"; e.currentTarget.style.transform="translateY(0)"; }}
                    >Kirim Konfirmasi →</button>
                  </form>
                ) : (
                  <Ticket data={result} onReset={() => { setDone(false); setF({ name:"", attending:"yes", count:1, message:"" }); }} />
                )}
              </div>
            </div>
          </section>
        );
      };

      /* ════════════════════════════════════════════
         ADMIN PANEL — FIX 2: Excel export
      ════════════════════════════════════════════ */
      const Admin = ({ onClose }) => {
        const [pass, setPass] = useState("");
        const [auth, setAuth] = useState(false);
        const [err, setErr] = useState("");
        const [data, setData] = useState([]);
        const [tab, setTab] = useState("all");

        const login = () => {
          if (pass === C.adminPass) { setAuth(true); setData(loadRSVPs()); setErr(""); }
          else setErr("Password salah. Coba lagi.");
        };

        const filtered = tab === "all" ? data : data.filter(r => r.attending === tab);
        const totalH = data.filter(r => r.attending === "yes").length;
        const totalT = data.filter(r => r.attending === "no").length;
        const totalO = data.filter(r => r.attending === "yes").reduce((s,r) => s + Number(r.count||1), 0);

        return (
          <div className="admin-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
            <div className="admin-box">
              <div style={{ padding:"22px 26px 18px", borderBottom:"1px solid #F3F4F6", display:"flex", alignItems:"center", justifyContent:"space-between", flexShrink:0 }}>
                <div>
                  <h3 className="font-serif" style={{ fontSize:22, fontWeight:500, color:"var(--color-text)", margin:"0 0 2px" }}>Admin Panel</h3>
                  <p style={{ fontFamily:"var(--font-sans)", fontSize:12, color:"#9CA3AF", margin:0 }}>Data konfirmasi kehadiran tamu</p>
                </div>
                <button onClick={onClose} style={{ width:34, height:34, borderRadius:"50%", border:"1px solid #E5E7EB", background:"#fff", cursor:"pointer", fontSize:16, color:"#9CA3AF", display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
              </div>
              <div style={{ flex:1, overflowY:"auto", padding:"22px 26px" }}>
                {!auth ? (
                  <div style={{ maxWidth:300, margin:"36px auto", textAlign:"center" }}>
                    <div style={{ fontSize:38, marginBottom:14 }}>🔐</div>
                    <p style={{ fontFamily:"var(--font-sans)", fontSize:14, color:"#6B7280", marginBottom:18 }}>Masukkan password admin.</p>
                    <input type="password" className="form-field" placeholder="Password" value={pass} onChange={e => setPass(e.target.value)} onKeyDown={e => e.key==="Enter"&&login()} style={{ marginBottom:10 }} />
                    {err && <p style={{ fontFamily:"var(--font-sans)", fontSize:12, color:"#ef4444", marginBottom:10 }}>{err}</p>}
                    <button onClick={login} style={{ width:"100%", padding:"13px", borderRadius:14, border:"none", background:"var(--color-accent)", color:"#fff", fontFamily:"var(--font-sans)", fontSize:13, fontWeight:600, cursor:"pointer" }}>Masuk</button>
                    <p style={{ fontFamily:"var(--font-sans)", fontSize:11, color:"#C4C9D1", marginTop:14 }}>Password default: <code>admin123</code></p>
                  </div>
                ) : (
                  <>
                    <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:12, marginBottom:18 }}>
                      {[{l:"Total Hadir",v:totalH,c:"#16a34a",bg:"rgba(34,197,94,.08)"},{l:"Tidak Hadir",v:totalT,c:"#dc2626",bg:"rgba(239,68,68,.08)"},{l:"Total Tamu",v:totalO,c:"var(--color-accent)",bg:"var(--color-accent-soft)"}].map(({ l,v,c,bg }) => (
                        <div key={l} style={{ background:bg, borderRadius:16, padding:"16px 12px", textAlign:"center" }}>
                          <p className="font-serif" style={{ fontSize:28, fontWeight:500, color:c, margin:"0 0 4px" }}>{v}</p>
                          <p style={{ fontFamily:"var(--font-sans)", fontSize:10, letterSpacing:".14em", textTransform:"uppercase", color:"#6B7280", margin:0 }}>{l}</p>
                        </div>
                      ))}
                    </div>
                    <div style={{ display:"flex", gap:8, marginBottom:14, flexWrap:"wrap" }}>
                      {[{k:"all",l:`Semua (${data.length})`},{k:"yes",l:`Hadir (${totalH})`},{k:"no",l:`Tidak Hadir (${totalT})`}].map(({ k,l }) => (
                        <button key={k} onClick={() => setTab(k)} style={{ padding:"6px 14px", borderRadius:999, fontFamily:"var(--font-sans)", fontSize:12, fontWeight:tab===k?600:400, border:`1.5px solid ${tab===k?"var(--color-accent)":"#E5E7EB"}`, background:tab===k?"var(--color-accent-soft)":"transparent", color:tab===k?"var(--color-accent)":"#6B7280", cursor:"pointer", transition:"all .2s" }}>{l}</button>
                      ))}
                      {data.length > 0 && (
                        /* FIX 2: Changed from CSV to Excel */
                        <button onClick={() => exportExcel(data)} style={{ marginLeft:"auto", padding:"6px 14px", borderRadius:999, fontFamily:"var(--font-sans)", fontSize:12, border:"1.5px solid #16a34a", background:"rgba(34,197,94,.07)", color:"#16a34a", cursor:"pointer", fontWeight:500 }}>
                          ⬇ Export Excel (.xlsx)
                        </button>
                      )}
                    </div>
                    {filtered.length === 0 ? (
                      <div style={{ textAlign:"center", padding:"48px 20px", color:"#C4C9D1" }}>
                        <p style={{ fontSize:32, marginBottom:10 }}>📋</p>
                        <p style={{ fontFamily:"var(--font-sans)", fontSize:14 }}>Belum ada data RSVP.</p>
                      </div>
                    ) : (
                      <div style={{ overflowX:"auto" }}>
                        <table className="atbl">
                          <thead>
                            <tr>
                              <th>#</th><th>Nama</th><th>Status</th><th>Tamu</th><th>ID Tiket</th><th>Pesan</th><th>Waktu</th>
                            </tr>
                          </thead>
                          <tbody>
                            {filtered.map((r,i) => (
                              <tr key={i}>
                                <td style={{ color:"#9CA3AF" }}>{i+1}</td>
                                <td style={{ fontWeight:600 }}>{r.name}</td>
                                <td><span className={r.attending==="yes"?"badge-y":"badge-n"}>{r.attending==="yes"?"Hadir":"Tidak Hadir"}</span></td>
                                <td style={{ textAlign:"center" }}>{r.attending==="yes"?r.count:"-"}</td>
                                <td style={{ fontFamily:"monospace", fontSize:12, letterSpacing:".08em", color:"var(--color-accent)", fontWeight:700 }}>{r.ticketId||"-"}</td>
                                <td style={{ maxWidth:150, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", color:"#6B7280", fontStyle:"italic" }}>{r.message||"-"}</td>
                                <td style={{ fontSize:11, color:"#9CA3AF", whiteSpace:"nowrap" }}>{r.at}</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    )}
                  </>
                )}
              </div>
            </div>
          </div>
        );
      };

      /* ════════════════════════════════════════════
         FOOTER
      ════════════════════════════════════════════ */
      const Footer = () => (
        <footer style={{ background:"#1F2937", padding:"64px 24px", position:"relative", overflow:"hidden" }}>
          <div style={{ position:"absolute", inset:0, pointerEvents:"none" }}><Truntum id="footer-tr" op={0.03} /></div>
          <div style={{ position:"relative", maxWidth:480, margin:"0 auto", textAlign:"center" }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:16, marginBottom:24 }}>
              <div style={{ height:1, width:40, background:"rgba(255,255,255,.15)" }} />
              <span style={{ color:"var(--color-accent)", fontSize:18 }}>✦</span>
              <div style={{ height:1, width:40, background:"rgba(255,255,255,.15)" }} />
            </div>
            <h3 className="font-serif" style={{ fontSize:36, fontWeight:500, color:"#fff", margin:"0 0 6px" }}>{C.bride.first} & {C.groom.first}</h3>
            <p className="font-serif" style={{ fontStyle:"italic", fontSize:14, color:"rgba(255,255,255,.35)", margin:"0 0 32px" }}>{C.dateDisplay}</p>
            <p className="font-serif" style={{ fontStyle:"italic", fontSize:14, color:"rgba(255,255,255,.25)", lineHeight:1.85, margin:"0 0 8px" }}>"Dan di antara tanda-tanda kekuasaan-Nya ialah Dia menciptakan untukmu pasangan hidup dari jenismu sendiri, supaya kamu cenderung dan merasa tenteram kepadanya."</p>
            <p style={{ fontFamily:"var(--font-sans)", fontSize:11, color:"rgba(226,114,91,.6)", letterSpacing:".1em" }}>— QS. Ar-Rum: 21</p>
            <div style={{ marginTop:48, paddingTop:24, borderTop:"1px solid rgba(255,255,255,.07)" }}>
              <p style={{ fontFamily:"var(--font-sans)", fontSize:11, color:"rgba(255,255,255,.2)" }}>Dibuat dengan ♥ untuk {C.bride.first} & {C.groom.first}</p>
            </div>
          </div>
        </footer>
      );

      /* ════════════════════════════════════════════
         APP — FIX 3: audio wired up
      ════════════════════════════════════════════ */
      const App = () => {
        const [playing, setPlaying] = useState(false);
        const [active, setActive] = useState("hero");
        const [showAdmin, setShowAdmin] = useState(false);

        const handleToggle = () => {
          if (playing) {
            stopGamelan();
            setPlaying(false);
          } else {
            startGamelan();
            setPlaying(true);
          }
        };

        useEffect(() => {
          const io = new IntersectionObserver(
            e => e.forEach(x => { if (x.isIntersecting) x.target.classList.add("in"); }),
            { threshold: 0.12 }
          );
          document.querySelectorAll(".sr").forEach(el => io.observe(el));
          return () => io.disconnect();
        }, []);

        useEffect(() => {
          const ids = ["hero","couple","events","rsvp"];
          const io = new IntersectionObserver(
            e => e.forEach(x => { if (x.isIntersecting) setActive(x.target.id); }),
            { threshold: 0.4 }
          );
          ids.forEach(id => { const el = document.getElementById(id); if (el) io.observe(el); });
          return () => io.disconnect();
        }, []);

        useEffect(() => {
  // Autoplay saat halaman pertama dibuka
  setTimeout(() => {
    startGamelan();
    setPlaying(true);
  }, 800); // delay 800ms agar halaman selesai render dulu
}, []);

useEffect(() => {
  return () => { stopGamelan(); };
}, []);
        // Cleanup audio on unmount
        useEffect(() => {
          return () => { stopGamelan(); };
        }, []);

        return (
          <>
            <Nav active={active} onAdmin={() => setShowAdmin(true)} />
            <Hero isPlaying={playing} onToggle={handleToggle} />
            <Couple />
            <Events />
            <RSVP />
            <Footer />
            {showAdmin && <Admin onClose={() => setShowAdmin(false)} />}
          </>
        );
      };

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
