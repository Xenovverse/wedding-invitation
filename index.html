<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ayunda & Bagas — Undangan Pernikahan</title>

  <!-- ── Fonts ── -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet"/>

  <!-- ── Styles ── -->
  <link rel="stylesheet" href="css/styles.css"/>

  <!-- ── Tailwind (utility classes) ── -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- ── React ecosystem (CDN, no bundler needed) ── -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- ── Export libraries ── -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

  <!-- React mount point -->
  <div id="root"></div>

  <!--
    ═══════════════════════════════════════════════════════════
    URUTAN LOADING PENTING — jangan ubah urutan script di bawah.
    config.js, audio.js, api.js, export.js dimuat sebagai script
    biasa (synchronous) sehingga variabelnya tersedia ketika
    Babel memproses app.js (type="text/babel").
    ═══════════════════════════════════════════════════════════
  -->

  <!-- 1. Konstanta & helper -->
  <script src="js/config.js"></script>

  <!-- 2. Audio engine -->
  <script src="js/audio.js"></script>

  <!-- 3. API — komunikasi dengan Netlify Function -->
  <script src="js/api.js"></script>

  <!-- 4. Export PDF & Excel -->
  <script src="js/export.js"></script>

  <!-- 5. Semua komponen React (diproses Babel → JSX → JS) -->
  <script type="text/babel" src="js/app.js"></script>

</body>
</html>
